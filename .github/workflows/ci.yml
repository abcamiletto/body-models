name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uvx ruff check .

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uvx ruff format --check .

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run --group docs mkdocs build --strict

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run --group dev --extra torch --extra jax ty check

  tests-fast:
    name: Tests Fast (${{ matrix.group }})
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: anny
            paths: tests/test_anny.py
          - group: flame
            paths: tests/test_flame.py
          - group: mhr
            paths: tests/test_mhr.py
          - group: skel
            paths: tests/test_skel.py
          - group: smpl
            paths: tests/test_smpl.py
          - group: smplh
            paths: tests/test_smplh.py
          - group: mano
            paths: tests/test_mano.py
          - group: smplx
            paths: tests/test_smplx.py
          - group: soma
            paths: tests/test_soma.py tests/test_soma_identity_backends.py
          - group: garment-measurements
            paths: tests/test_garment_measurements.py tests/test_garment_measurements_io.py
          - group: g1
            paths: tests/test_g1.py tests/test_g1_io.py
          - group: compile
            paths: tests/test_compile.py
          - group: interface
            paths: tests/test_common.py tests/test_model_interface.py
    env:
      UV_PYTHON: "3.12"
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Download test assets
        run: |
          uvx --from huggingface-hub hf download \
            abcamiletto/body-models-assets \
            --repo-type dataset \
            --local-dir tests/assets \
            --token "$HF_TOKEN"
      - run: uv sync --group dev --all-extras --frozen
      - run: uv run pytest -q -m fast ${{ matrix.paths }}

  tests-version-smoke:
    name: Tests Version Smoke (py${{ matrix.python-version }}, ${{ matrix.resolution }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            resolution: locked
          - python-version: "3.12"
            resolution: locked
          - python-version: "3.13"
            resolution: locked
          - python-version: "3.11"
            resolution: lowest-direct
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
      - name: Sync environment
        run: |
          if [ "${{ matrix.resolution }}" = "lowest-direct" ]; then
            uv sync --group dev --all-extras --resolution lowest-direct
          else
            uv sync --group dev --all-extras --frozen
          fi
      - run: uv run pytest -q tests/test_version_smoke.py
