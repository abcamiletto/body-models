name: Slow Tests

on:
  workflow_dispatch:

jobs:
  slow-compile:
    name: Slow Compile Tests
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Download test assets
        run: |
          uvx --from huggingface-hub hf download \
            abcamiletto/body-models-assets \
            --repo-type dataset \
            --local-dir tests/assets \
            --token "$HF_TOKEN"
      - run: uv sync --group dev --all-extras --frozen
      - run: uv run pytest -q tests/test_compile.py
