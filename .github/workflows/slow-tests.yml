name: Slow Tests

on:
  workflow_dispatch:

jobs:
  slow-compile:
    name: Slow Compile Tests
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
      GH_TOKEN: ${{ secrets.ASSETS_PAT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Download test assets
        run: |
          ASSET_URL=$(curl -sL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/abcamiletto/body-models-test-assets/releases/tags/latest" \
            | python3 -c "import sys,json; print(next(a['url'] for a in json.load(sys.stdin)['assets'] if a['name']=='assets.tar.gz'))")
          curl -sL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/octet-stream" \
            "$ASSET_URL" -o /tmp/assets.tar.gz
          tar xzf /tmp/assets.tar.gz -C tests/
      - run: uv sync --group dev --all-extras --frozen
      - run: uv run pytest -q -m slow tests/test_compile.py
