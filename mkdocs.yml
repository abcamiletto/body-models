site_name: body-models
site_url: https://abcamiletto.github.io/body-models/
site_author: Andrea Boscolo Camiletto
site_description: Multi-backend parametric body models for NumPy, PyTorch, and JAX
repo_name: body-models
repo_url: https://github.com/abcamiletto/body-models

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
  features:
    - content.code.copy
    - search.suggest
    - navigation.instant
    - navigation.sections
    - navigation.footer
    - navigation.top

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            docstring_style: google
            show_root_heading: true
            show_if_no_docstring: false
            inherited_members: true
            members_order: source
            unwrap_annotated: true
            line_length: 70
            filters:
              - "!^_"
              - "!^get_bind_params$"
            merge_init_into_class: true
            docstring_section_style: spacy
            signature_crossrefs: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            separate_signature: true
            summary: true

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Home: index.md
  - Models:
      - Full Bodies:
          - SMPL: models/smpl.md
          - SMPL-H: models/smplh.md
          - SMPL-X: models/smplx.md
          - ANNY: models/anny.md
          - MHR: models/mhr.md
          - SOMA: models/soma.md
          - GarmentMeasurements: models/garment-measurements.md
      - Anatomicals:
          - SKEL: models/skel.md
          - MyoFullBody: models/myofullbody.md
      - Heads:
          - FLAME: models/flame.md
      - Hands:
          - MANO: models/mano.md
      - Robots:
          - BrainCo: models/brainco.md
          - G1: models/g1.md
          - SmplHumanoid: models/smpl-humanoid.md
strict: true
